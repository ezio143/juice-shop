# Security Pipeline
# Gating philosophy: only Snyk (SCA) fails the build on high/critical severity.
# CodeQL (SAST) and ZAP (DAST) run in report-only mode, surfacing findings via
# the Security tab / artifact reports without blocking merges. This mirrors a
# common "minimal friction" rollout pattern before tightening gates over time.
name: Security Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run existing test suite
        run: npm test

  codeql-sast:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  snyk-sca:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '22'

        - name: Install dependencies
          run: npm install

        - name: Run Snyk to check for vulnerabilities
          uses: snyk/actions/node@master
          env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          with:
            args: --severity-threshold=high

  zap-dast:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Build Docker image from fork
          run: docker build -t juice-shop .

        - name: Start Juice Shop container
          run: |
            docker run -d -p 3000:3000 --name juice-shop juice-shop
            sleep 20

        - name: Wait for app to be ready
          run: |
            for i in {1..10}; do
              curl -sf http://localhost:3000 && break
              echo "Waiting for app..."
              sleep 5
            done

        - name: ZAP Baseline Scan
          uses: zaproxy/action-baseline@v0.12.0
          continue-on-error: true
          with:
            target: 'http://localhost:3000'
            cmd_options: '-a'
            fail_action: false
            allow_issue_writing: false

        - name: Upload ZAP report
          uses: actions/upload-artifact@v4
          with:
            name: zap-report
            path: |
              report_html.html
              report_md.md
              report_json.json
            if-no-files-found: warn