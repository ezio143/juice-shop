# Security Pipeline
# Gating philosophy: only Snyk (SCA) fails the build on high/critical severity.
# CodeQL (SAST) and ZAP (DAST) run in report-only mode, surfacing findings via
# the Security tab / artifact reports without blocking merges. This mirrors a
# common "minimal friction" rollout pattern before tightening gates over time.
name: Security Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 #v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run existing test suite
        run: npm test

  codeql-sast:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 #v3.37.1
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@b7351df727350dca84cb9d725d57dcf5bc82ba26 #v3.37.1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 #v3.37.1

  snyk-sca:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

        - name: Set up Node.js
          uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 #v4.4.0
          with:
            node-version: '22'

        - name: Install dependencies
          run: npm install

        - name: Run Snyk to check for vulnerabilities
          uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 #v1.0.0
          env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          with:
            args: --severity-threshold=high

  zap-dast:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

        - name: Build Docker image from fork
          run: docker build -t juice-shop .

        - name: Start Juice Shop container
          run: |
            docker run -d -p 3000:3000 --name juice-shop juice-shop
            sleep 20

        - name: Wait for app to be ready
          run: |
            for i in {1..10}; do
              curl -sf http://localhost:3000 && break
              echo "Waiting for app..."
              sleep 5
            done

        - name: ZAP Baseline Scan
          uses: zaproxy/action-baseline@906a3c93ffde4864839d31a93daadcbd2737b4da #v0.12.0
          continue-on-error: true
          with:
            target: 'http://localhost:3000'
            cmd_options: '-a'
            fail_action: false
            allow_issue_writing: false

        - name: Upload ZAP report
          uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
          with:
            name: zap-report
            path: |
              report_html.html
              report_md.md
              report_json.json
            if-no-files-found: warn