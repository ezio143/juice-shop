# Security Pipeline
# Gating philosophy: only Snyk (SCA) fails the build on high/critical severity.
# CodeQL (SAST) and ZAP (DAST) run in report-only mode, surfacing findings via
# the Security tab / artifact reports without blocking merges. This mirrors a
# common "minimal friction" rollout pattern before tightening gates over time.
name: Security Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 #v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run existing test suite
        run: npm test

  codeql-sast:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 #v3.37.1
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@b7351df727350dca84cb9d725d57dcf5bc82ba26 #v3.37.1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 #v3.37.1

  snyk-sca:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

        - name: Set up Node.js
          uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 #v4.4.0
          with:
            node-version: '22'

        - name: Install dependencies
          run: npm install

        - name: Run Snyk to check for vulnerabilities
          uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 #v1.0.0
          env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          with:
            args: --severity-threshold=high

  zap-dast:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

        - name: Build Docker image from fork
          run: docker build -t juice-shop .

        - name: Start Juice Shop container
          run: |
            docker run -d -p 3000:3000 --name juice-shop juice-shop
            sleep 20

        - name: Wait for app to be ready
          run: |
            for i in {1..10}; do
              curl -sf http://localhost:3000 && break
              echo "Waiting for app..."
              sleep 5
            done

        - name: ZAP Baseline Scan
          uses: zaproxy/action-baseline@906a3c93ffde4864839d31a93daadcbd2737b4da #v0.12.0
          continue-on-error: true
          with:
            target: 'http://localhost:3000'
            cmd_options: '-a'
            fail_action: false
            allow_issue_writing: false

        - name: Upload ZAP report
          uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
          with:
            name: zap-report
            path: |
              report_html.html
              report_md.md
              report_json.json
            if-no-files-found: warn

        - name: Verify container does not run as root
          run: |
            USER_ID=$(docker inspect --format '{{.Config.User}}' juice-shop:scan)
            if [ -z "$USER_ID" ] || [ "$USER_ID" = "0" ] || [ "$USER_ID" = "root" ]; then
              echo "::error::Container is running as root (User: '$USER_ID')"
              exit 1
            fi
            echo "Container correctly configured to run as non-root user: $USER_ID"

  generate-sbom:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

        - name: Generate SBOM with Syft
          uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
          with:
            path: .
            format: cyclonedx-json
            output-file: sbom.cyclonedx.json

        - name: Upload SBOM artifact
          uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
          with:
            name: sbom
            path: sbom.cyclonedx.json
            if-no-files-found: error

  sign-sbom:
    runs-on: ubuntu-latest
    needs: generate-sbom
    permissions:
      id-token: write   # required to request the OIDC token for keyless signing
      contents: read

    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign the SBOM (keyless)
        run: cosign sign-blob --yes sbom.cyclonedx.json --output-signature sbom.cyclonedx.json.sig --output-certificate sbom.cyclonedx.json.crt

      - name: Upload signature and certificate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-signature
          path: |
            sbom.cyclonedx.json.sig
            sbom.cyclonedx.json.crt
          if-no-files-found: error

  gitleaks-scan:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
          with:
            fetch-depth: 0   # gitleaks needs full git history, not just the latest commit, to scan past commits

        - name: Run gitleaks
          uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-scan:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        security-events: write
      steps:
        - name: Checkout code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

        - name: Build Docker image
          run: docker build -t juice-shop:scan .

        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
          with:
            image-ref: 'juice-shop:scan'
            format: 'sarif'
            output: 'trivy-results.sarif'
            severity: 'CRITICAL,HIGH'
            exit-code: '1'          # fail the build if matching severities are found
            vuln-type: 'os'  # both OS packages and application-layer libraries

        - name: Upload Trivy results to Security tab
          if: always()              # upload even if the scan step above failed the build
          uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
          with:
            sarif_file: 'trivy-results.sarif'

        - name: Upload raw SARIF as artifact
          if: always()
          uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
          with:
            name: trivy-sarif
            path: trivy-results.sarif
            if-no-files-found: error