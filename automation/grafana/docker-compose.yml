version: "3.8"

services:
  # Serves findings/*.json over plain HTTP so Grafana's Infinity datasource
  # can query it like an API. Simpler than standing up a real backend.
  findings-server:
    image: python:3.12-slim
    container_name: findings-server
    working_dir: /findings
    volumes:
      - ../findings:/findings:ro
    command: python -m http.server 8000
    ports:
      - "8000:8000"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    depends_on:
      - findings-server
    environment:
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3001:3000"
    volumes:
      - ./provisioning:/etc/grafana/provisioning
      - grafana-storage:/var/lib/grafana

volumes:
  grafana-storage: